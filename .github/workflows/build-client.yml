# Required GitHub secrets (Settings → Secrets and variables → Actions):
#
#   DEVELOPER_ID_APP           — Full cert name, e.g. "Developer ID Application: Jane Smith (TEAMID)"
#   DEVELOPER_ID_APP_CERT_P12  — Base64-encoded .p12 export (cert + private key)
#   DEVELOPER_ID_APP_CERT_PASSWORD — Password for the .p12 export
#   APPLE_ID                   — Apple ID email for notarization
#   APP_SPECIFIC_PASSWORD      — App-specific password from appleid.apple.com
#   TEAM_ID                    — 10-character Apple Developer Team ID
#   SPARKLE_ED_PRIVATE_KEY     — EdDSA private key (base64) for Sparkle appcast signing
#
# Notarization uses --apple-id / --password / --team-id (NOT --keychain-profile;
# keychains do not persist across CI runners).

name: Build & Distribute Client

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write   # required to upload assets to a GitHub Release

jobs:
  build-dmg:
    name: Build, Sign, Notarize DMG
    runs-on: macos-14

    steps:
      # -----------------------------------------------------------------------
      # Validate that all required secrets are present before spending CI time.
      # G8: Each secret is mapped to a 1-char env var so the actual value is
      # never printed even in debug mode.
      # -----------------------------------------------------------------------
      - name: Validate required secrets
        run: |
          missing=()
          for s in DEVELOPER_ID_APP DEVELOPER_ID_APP_CERT_P12 DEVELOPER_ID_APP_CERT_PASSWORD APPLE_ID APP_SPECIFIC_PASSWORD TEAM_ID SPARKLE_ED_PRIVATE_KEY; do
            varname="${s}_LEN"
            v="${!varname}"
            [ -n "$v" ] || missing+=("$s")
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required secrets: ${missing[*]}"
            exit 1
          fi
          echo "All required secrets are present."
        env:
          DEVELOPER_ID_APP_LEN: ${{ secrets.DEVELOPER_ID_APP != '' && '1' || '' }}
          DEVELOPER_ID_APP_CERT_P12_LEN: ${{ secrets.DEVELOPER_ID_APP_CERT_P12 != '' && '1' || '' }}
          DEVELOPER_ID_APP_CERT_PASSWORD_LEN: ${{ secrets.DEVELOPER_ID_APP_CERT_PASSWORD != '' && '1' || '' }}
          APPLE_ID_LEN: ${{ secrets.APPLE_ID != '' && '1' || '' }}
          APP_SPECIFIC_PASSWORD_LEN: ${{ secrets.APP_SPECIFIC_PASSWORD != '' && '1' || '' }}
          TEAM_ID_LEN: ${{ secrets.TEAM_ID != '' && '1' || '' }}
          SPARKLE_ED_PRIVATE_KEY_LEN: ${{ secrets.SPARKLE_ED_PRIVATE_KEY != '' && '1' || '' }}

      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Xcode — pin to 16.x (latest stable on macos-14 runner pool)
      # -----------------------------------------------------------------------
      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      # -----------------------------------------------------------------------
      # Import Developer ID certificate into a short-lived build keychain
      # -----------------------------------------------------------------------
      - name: Import signing certificate
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_APP_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_APP_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"

          # Decode certificate
          echo "$CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          # Create a fresh keychain with a random password
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the .p12
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Allow codesign to access the key without a UI prompt
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          # Make this keychain searchable
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | xargs)

          # Clean up decoded p12 from disk
          rm -f "$CERT_PATH"

      # -----------------------------------------------------------------------
      # Expose Sparkle private key as an environment variable for build-client.sh
      # -----------------------------------------------------------------------
      - name: Set up Sparkle private key
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          # Write key to a temp file that build-client.sh can read,
          # then export as env var (build-client.sh reads SPARKLE_ED_PRIVATE_KEY).
          KEY_FILE="$RUNNER_TEMP/sparkle_private_key.txt"
          echo "$SPARKLE_ED_PRIVATE_KEY" > "$KEY_FILE"
          echo "SPARKLE_KEY_FILE=$KEY_FILE" >> "$GITHUB_ENV"
          # Also expose it directly for scripts that prefer the env var
          echo "SPARKLE_ED_PRIVATE_KEY=$SPARKLE_ED_PRIVATE_KEY" >> "$GITHUB_ENV"

      # -----------------------------------------------------------------------
      # Build → archive → export → sign → create DMG → notarize → staple
      # build-client.sh accepts DEVELOPER_ID_APP as $1 and reads:
      #   APPLE_ID, APP_SPECIFIC_PASSWORD, TEAM_ID, SPARKLE_ED_PRIVATE_KEY
      # Notarization uses --apple-id/--password/--team-id (no --keychain-profile).
      # -----------------------------------------------------------------------
      - name: Build, notarize, and package DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          bash scripts/build-client.sh "${{ secrets.DEVELOPER_ID_APP }}"

      # -----------------------------------------------------------------------
      # Attach DMG and Sparkle appcast snippet to the GitHub Release
      # (creates the release if triggered by a tag push)
      # -----------------------------------------------------------------------
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            client/build/WisprAlt.dmg
            client/build/appcast-snippet.xml
          # If the release was already created by the tag push the action will
          # update it; otherwise it creates a draft release.
          draft: false
          generate_release_notes: true

      # -----------------------------------------------------------------------
      # Clean up build keychain so it does not linger on the runner
      # -----------------------------------------------------------------------
      - name: Delete build keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain" || true
